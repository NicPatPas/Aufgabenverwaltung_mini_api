# ========================
# Server
# ========================
server.port=8080

# ========================
# Datenbank (MySQL)
# WICHTIG: Datenbank "taskflow_db" muss in MySQL existieren!
# Befehl: CREATE DATABASE taskflow_db;
# ========================
spring.datasource.url=jdbc:mysql://localhost:3306/taskflow_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ========================
# JPA / Hibernate
# create-drop: Tabellen beim Start erstellen, beim Stop loeschen
# update:      Tabellen beim Start aktualisieren (fuer Entwicklung)
# ========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ========================
# JWT
# Secret muss Base64-kodiert sein und mind. 256 Bit (32 Zeichen) lang sein.
# WICHTIG: In Produktion durch einen sicheren, zufaelligen Wert ersetzen!
# ========================
jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
jwt.expiration=86400000

# ========================
# Logging
# ========================
logging.level.com.taskflow=DEBUG
